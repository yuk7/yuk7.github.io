name: Node.js Deploy CI

on:
  push:
    branches:
      - source

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    - name: Setup Node.js
      uses: actions/setup-node@v1
      with:
        node-version: '13.x'
    - name: Build
      run:
        npm install
        npm run build
    - name: Setup Git
      run:
        git config --global user.name "bot"
        git config --global user.name ${{secrets.ACTIONS_EMAIL}}
    - name: Deploy
      run:
        git clone https://github.com/${{github.actor}}:${{github.token}}@github.com/${{github.repository}} -b master
        mv yuk7.github.io/.git dist/
        cd dist
        git add .
        git commit -m "built from ${{github.sha}}"
        git push --force-with-lease origin master
        
